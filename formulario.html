<section>
    <article>
        <h2>1. Inicio de Sesión</h2>
        <form action="#">
            <label for="user">Usuario:</label>
            <input type="text" id="user" name="user" placeholder="Tu nombre de usuario" required>
            <br><br>
            <label for="pass">Contraseña:</label>
            <input type="password" id="pass" name="pass" required>
            <br><br>
            <button type="submit">Entrar</button>
        </form>
    </article>

    <hr> <article>
        <h2>registro</h2>
        <form action="#">
            <br><br>
            <label for="reg-nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required>
<br><br>
            <label for="reg-email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>
<br><br>
            <label>
                <input type="checkbox" name="noticias"> Deseo recibir noticias en mi correo
            </label>
            <br><br>

            <button type="submit">Crear Cuenta</button>
        </form>
    </article>

    <hr>

    <article>
        <h2>Déja tu Comentario</h2>
        <form action="#">
            <label for="opinion">¿Qué te pareció el último Super Bowl?</label>
            <textarea id="opinion" name="opinion" rows="4" placeholder="Escribe aquí tu opinión..."></textarea>
            
            <button type="submit">Publicar Comentario</button>
        </form>
    </article>
</section>
